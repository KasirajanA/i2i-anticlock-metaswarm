version: "1.0"

tools:
  codex:
    enabled: true
    use_for:
      - implementation
      - refactoring
  gemini:
    enabled: true
    use_for:
      - code_review
      - adversarial_verify

delegation:
  simple_tasks: codex        # straightforward implementation
  review_tasks: gemini       # cross-model adversarial review
  complex_tasks: claude      # orchestration, architecture, security
